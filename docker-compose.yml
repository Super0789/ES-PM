version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-espm}
      POSTGRES_USER: ${POSTGRES_USER:-espm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-espm_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-espm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    restart: unless-stopped
    volumes:
      - media_files:/app/media
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-changeme-use-a-real-secret-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-espm}:${POSTGRES_PASSWORD:-espm_password}@db:5432/${POSTGRES_DB:-espm}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      MEDIA_ROOT: /app/media
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_files:/app/media:ro
    depends_on:
      - web
      - frontend

volumes:
  postgres_data:
  media_files:
